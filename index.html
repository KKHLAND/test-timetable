<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>시험 시간표 생성 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind 커스텀 폰트 및 설정 -->
    <script>
        tailwind.config = {
            darkMode: 'class', 
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'Roboto', 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;
        }

        /* 인쇄용 스타일 (기존 유지 + 색상 조정) */
        @media print {
            @page {
                size: A4 landscape;
                margin: 1cm 0.3cm;
            }
            body {
                background: white !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .print-hidden {
                display: none !important;
            }
            #printable-section {
                margin: 0 !important;
                padding: 0.5cm !important;
                box-shadow: none !important;
            }
            #printable-section .print-card {
                box-shadow: none !important;
                border: none !important;
                background: transparent !important;
                padding: 0 !important;
            }
            #printable-section .print-header-container h2 {
                color: black !important;
                font-size: 18pt !important;
                font-weight: bold;
                text-align: center;
                margin-bottom: 1rem;
            }
            #printable-section .print-header-container img {
                position: absolute !important;
                top: 0 !important;
                right: 0 !important;
                max-height: 50px !important;
            }
            table {
                width: 100% !important;
                table-layout: fixed !important;
                border-collapse: collapse !important;
            }
            th, td {
                border: 1px solid #000 !important;
                padding: 2px !important; 
                text-align: center !important;
                color: black !important;
                font-size: 7.5pt !important;
            }
            thead th {
                background-color: #f1f5f9 !important;
                font-weight: bold !important;
            }
        }

        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">
    <div id="root" class="flex-grow flex flex-col"></div>

    <script type="text/babel">
      const { useState, useCallback, useMemo, useEffect, Fragment } = React;

      // ==========================================
      // 데이터 처리 로직
      // ==========================================
      const getTimeSlotKey = (date, period) => `${date}|${period}`;

      const generatePersonalTimetableCsv = (data, metadata, headerInputs) => {
        const studentSchedules = new Map();
        const timeSlotSet = new Set();

        data.forEach(entry => {
          if (!entry.학번 || !entry.이름 || !entry.날짜 || !entry.교시 || !entry.과목) return;
          if (isNaN(parseInt(entry.교시, 10))) return;

          if (!studentSchedules.has(entry.학번)) {
            studentSchedules.set(entry.학번, { name: entry.이름, exams: {} });
          }
          const studentData = studentSchedules.get(entry.학번);
          if (studentData) {
            studentData.exams[getTimeSlotKey(entry.날짜, entry.교시)] = entry.과목;
          }
          timeSlotSet.add(getTimeSlotKey(entry.날짜, entry.교시));
        });

        const sortedTimeSlots = Array.from(timeSlotSet).map(s => {
          const [date, period] = s.split('|');
          return { date, period: parseInt(period) };
        }).sort((a, b) => {
          const dateA = new Date(a.date.split('(')[0].replace(/\//g, '-'));
          const dateB = new Date(b.date.split('(')[0].replace(/\//g, '-'));
          if (dateA.getTime() !== dateB.getTime()) {
            return dateA.getTime() - dateB.getTime();
          }
          return a.period - b.period;
        });

        const csvRows = [];
        const headerRow1 = ['날짜', ''];
        const dateColspans = {};
        sortedTimeSlots.forEach(slot => {
          dateColspans[slot.date] = (dateColspans[slot.date] || 0) + 1;
        });

        const processedDates = new Set();
        sortedTimeSlots.forEach(slot => {
          if (!processedDates.has(slot.date)) {
            headerRow1.push(slot.date);
            for (let i = 1; i < dateColspans[slot.date]; i++) {
              headerRow1.push('');
            }
            processedDates.add(slot.date);
          }
        });
        csvRows.push(headerRow1);

        const headerRow2 = ['과목', ''];
        sortedTimeSlots.forEach(slot => {
          const key = getTimeSlotKey(slot.date, slot.period);
          headerRow2.push(headerInputs[key]?.subject || '');
        });
        csvRows.push(headerRow2);

        const headerRow3 = ['교시', ''];
        sortedTimeSlots.forEach(slot => headerRow3.push(String(slot.period)));
        csvRows.push(headerRow3);

        const headerRow4 = ['학번', '이름'];
        sortedTimeSlots.forEach(slot => {
          const key = getTimeSlotKey(slot.date, slot.period);
          headerRow4.push(headerInputs[key]?.time || '');
        });
        csvRows.push(headerRow4);

        const sortedStudentIds = Array.from(studentSchedules.keys()).sort();
        sortedStudentIds.forEach(studentId => {
          const studentData = studentSchedules.get(studentId);
          if (!studentData) return;

          const row = [studentId, studentData.name];
          sortedTimeSlots.forEach(slot => {
            const key = getTimeSlotKey(slot.date, slot.period);
            row.push(studentData.exams[key] || '');
          });
          csvRows.push(row);
        });

        const bom = '\uFEFF';
        const csvString = csvRows.map(row =>
          row.map(cell => {
            const newCell = String(cell).replace(/"/g, '""');
            if (newCell.includes(',') || newCell.includes('"') || newCell.includes('\n')) {
              return `"${newCell}"`;
            }
            return newCell;
          }).join(',')
        ).join('\n');

        return { csvString: bom + csvString, csvRows };
      };

      // ==========================================
      // UI 컴포넌트
      // ==========================================
      
      const Card = ({ children, className = '', title, badgeText, icon, theme = 'blue' }) => {
        const themeConfig = {
            blue: { border: 'bg-blue-500', icon: 'text-blue-500', badge: 'text-blue-700 bg-blue-50 font-bold' },
            teal: { border: 'bg-teal-400', icon: 'text-teal-500', badge: 'text-teal-700 bg-teal-50 font-bold' },
            indigo: { border: 'bg-indigo-500', icon: 'text-indigo-500', badge: 'text-indigo-700 bg-indigo-50 font-bold' },
            purple: { border: 'bg-purple-500', icon: 'text-purple-500', badge: 'text-purple-700 bg-purple-50 font-bold' }
        };
        const currentTheme = themeConfig[theme] || themeConfig.blue;

        return (
            <div className={`bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] relative overflow-hidden flex flex-col ${className}`}>
                <div className={`absolute top-0 left-0 right-0 h-1.5 ${currentTheme.border}`}></div>
                <div className="p-6 sm:p-8 flex-grow flex flex-col">
                    {(title || badgeText) && (
                        <div className="flex justify-between items-start mb-6">
                            <div className="flex items-center gap-3">
                                {icon && <div className={currentTheme.icon}>{icon}</div>}
                                {title && <h3 className="text-xl font-bold text-slate-800">{title}</h3>}
                            </div>
                            {badgeText && (
                                <span className={`px-3 py-1 text-xs rounded-lg tracking-wider ${currentTheme.badge}`}>
                                    {badgeText}
                                </span>
                            )}
                        </div>
                    )}
                    <div className="flex-grow">
                        {children}
                    </div>
                </div>
            </div>
        );
      };

      const InputBox = ({ label, type = "text", value, onChange, name }) => (
        <div className="bg-slate-50 p-4 rounded-2xl border border-transparent focus-within:border-blue-200 focus-within:ring-4 focus-within:ring-blue-50 transition-all">
            <label className="block text-sm font-semibold text-slate-500 mb-1">{label}</label>
            <input 
                type={type} 
                name={name} 
                value={value} 
                onChange={onChange} 
                className="w-full bg-transparent border-none p-0 text-lg font-bold text-slate-800 focus:outline-none focus:ring-0 placeholder-slate-300"
            />
        </div>
      );

      const SelectBox = ({ label, value, onChange, name, options }) => (
        <div className="bg-slate-50 p-4 rounded-2xl border border-transparent focus-within:border-blue-200 focus-within:ring-4 focus-within:ring-blue-50 transition-all">
            <label className="block text-sm font-semibold text-slate-500 mb-1">{label}</label>
            <select 
                name={name} 
                value={value} 
                onChange={onChange} 
                className="w-full bg-transparent border-none p-0 text-base font-bold text-slate-800 focus:outline-none focus:ring-0 cursor-pointer"
            >
                {options.map(opt => (
                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                ))}
            </select>
        </div>
      );

      const TimetablePreviewTable = ({ data }) => {
          if (!data || data.length === 0) return null;

          const headerRows = data.slice(0, 4);
          const bodyRows = data.slice(4);
          const numberOfTimeSlots = data.length > 0 ? data[0].length - 2 : 0;
          const subjectsRow = headerRows[1] || [];

          // break-keep을 적용하여 화면이 좁아 테이블이 축소될 때 한글 단어가 이상하게 잘리는 것을 방지합니다.
          const bodyCellClasses = "border border-slate-200 py-1.5 px-1.5 sm:px-2 text-center align-middle text-xs sm:text-sm break-keep";
          const headerCellClasses = "border border-slate-200 py-2 px-1.5 sm:px-2 text-center align-middle font-bold bg-slate-50 text-slate-700 text-xs sm:text-sm break-keep";

          return (
              <div id="timetable-scroll-container" className="overflow-x-auto mt-4 rounded-xl border border-slate-200 print:border-none print:overflow-visible">
                  {/* 화면에서는 table-auto를 사용하여 컨테이너 크기에 맞게 자동 축소되도록 하고, 인쇄시에는 table-fixed 유지 */}
                  <table className="w-full border-collapse table-auto print:table-fixed bg-white">
                      <colgroup>
                          <col style={{ width: '60px' }} />
                          <col style={{ width: '80px' }} />
                          {Array.from({ length: numberOfTimeSlots }).map((_, i) => {
                              let finalWidth = 100; 
                              const subject = subjectsRow[i + 2] || '';
                              const subjectName = subject.split(',')[0].trim();
                              
                              if (subjectName.includes('사회문제탐구')) {
                                  finalWidth = 110; 
                              } else if (subjectName.includes('영어독해와작문')) {
                                  finalWidth = 140;
                              }
                              // 화면 렌더링시 width는 '권장 너비'로 작동하며, 화면이 좁으면 유연하게 줄어듭니다.
                              return <col key={i} style={{ width: `${finalWidth}px` }} />;
                          })}
                      </colgroup>
                      <thead>
                          {headerRows.map((row, rIndex) => (
                              <tr key={rIndex}>
                                  {rIndex === 0 ? (
                                      (() => {
                                          const cells = [];
                                          cells.push(<th key="h0-0" colSpan={2} className={headerCellClasses}>{row[0]}</th>);
                                          let i = 2;
                                          while (i < row.length) {
                                              const cell = row[i];
                                              let colspan = 1;
                                              while (i + colspan < row.length && !row[i + colspan]) {
                                                  colspan++;
                                              }
                                              cells.push(<th key={i} colSpan={colspan} className={headerCellClasses}>{cell}</th>);
                                              i += colspan;
                                          }
                                          return cells;
                                      })()
                                  ) : rIndex < 3 ? (
                                      <>
                                          <th colSpan={2} className={headerCellClasses}>{row[0]}</th>
                                          {row.slice(2).map((cell, cIndex) => (
                                              <th key={cIndex} className={headerCellClasses}>
                                                  {rIndex === 1 && cell.includes(',') ? (
                                                      cell.split(',').map((part, i) => (
                                                          <Fragment key={i}>
                                                              {i > 0 && <br />}
                                                              {part.trim()}
                                                          </Fragment>
                                                      ))
                                                  ) : (
                                                      cell
                                                  )}
                                              </th>
                                          ))}
                                      </>
                                  ) : (
                                      row.map((cell, cIndex) => {
                                          if (cIndex >= 2) {
                                              const timeRegex = /(\d{1,2}:\d{2}~\d{1,2}:\d{2})/;
                                              const match = cell.match(timeRegex);

                                              if (match) {
                                                  const timePart = match[0];
                                                  const restPart = cell.replace(timeRegex, '').trim();

                                                  return (
                                                      <th key={cIndex} className={headerCellClasses}>
                                                          {timePart}
                                                          {restPart && (
                                                              <>
                                                                  <br />
                                                                  <span className="text-slate-500 font-normal whitespace-nowrap">{restPart}</span>
                                                              </>
                                                          )}
                                                      </th>
                                                  );
                                              }
                                          }
                                          return <th key={cIndex} className={headerCellClasses}>{cell}</th>;
                                      })
                                  )}
                              </tr>
                          ))}
                      </thead>
                      <tbody>
                          {bodyRows.map((row, rIndex) => (
                              <tr key={rIndex} className="hover:bg-blue-50/50 transition-colors">
                                  {row.map((cell, cIndex) => (
                                      <td key={cIndex} className={`${bodyCellClasses} ${cIndex < 2 ? 'font-semibold bg-slate-50/50' : ''}`}>
                                        {cell}
                                      </td>
                                  ))}
                              </tr>
                          ))}
                      </tbody>
                  </table>
              </div>
          );
      };

      const App = () => {
        const [metadata, setMetadata] = useState({ year: new Date().getFullYear().toString(), semester: '1', grade: '3', examType: 'midterm' });
        const [file, setFile] = useState(null);
        const [logoSrc, setLogoSrc] = useState(null);
        const [parsedData, setParsedData] = useState(null);
        const [timeSlots, setTimeSlots] = useState([]);
        const [headerInputs, setHeaderInputs] = useState({});
        const [isLoading, setIsLoading] = useState(false);
        const [error, setError] = useState(null);
        const [generatedCsvContent, setGeneratedCsvContent] = useState(null);
        const [generatedCsvRows, setGeneratedCsvRows] = useState(null);
        const [isDragging, setIsDragging] = useState(false);
        const [selectedClass, setSelectedClass] = useState('all');

        const handleMetadataChange = (e) => {
          const { name, value } = e.target;
          setMetadata(prev => ({ ...prev, [name]: value }));
        };

        const handleLogoChange = (e) => {
          const file = e.target.files?.[0];
          if (file && file.type.startsWith('image/')) {
              setError(null);
              const reader = new FileReader();
              reader.onload = (loadEvent) => {
                  setLogoSrc(loadEvent.target?.result);
              };
              reader.readAsDataURL(file);
          } else if (file) {
              setError('이미지 파일(jpg, png 등)을 선택해주세요.');
          }
        };

        const processFile = useCallback(async (selectedFile) => {
          if (!selectedFile) return;
          
          const fileName = selectedFile.name.toLowerCase();
          const isCsv = selectedFile.type === 'text/csv' || fileName.endsWith('.csv');
          const isExcel = fileName.endsWith('.xlsx') || fileName.endsWith('.xls') || selectedFile.type.includes('spreadsheet');
          
          if (!isCsv && !isExcel) {
              setError('잘못된 파일 형식입니다. CSV 또는 Excel 파일을 업로드해주세요.');
              return;
          }
          
          setFile(selectedFile);
          setError(null);
          setParsedData(null);
          setTimeSlots([]);
          setHeaderInputs({});
          setGeneratedCsvContent(null);
          setGeneratedCsvRows(null);
          setSelectedClass('all');
          
          if (fileName.endsWith('.xlsx') || fileName.endsWith('.xls')) {
              const reader = new FileReader();
              reader.onload = (event) => {
                  try {
                      const arrayBuffer = event.target?.result;
                      if (!arrayBuffer) return;
                      
                      const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                      const sheetName = workbook.SheetNames[0];
                      const worksheet = workbook.Sheets[sheetName];
                      const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                      
                      if (!rows || rows.length < 2) {
                          setError('Excel 파일에 데이터가 없습니다.');
                          return;
                      }
                      
                      const headers = rows[0];
                      const cleanHeaders = headers.map(h => String(h || '').trim().replace(/^\uFEFF/, ''));
                      
                      const cleanData = rows.slice(1).map(row => {
                          const obj = {};
                          cleanHeaders.forEach((header, idx) => {
                              obj[header] = String(row[idx] || '').trim();
                          });
                          return obj;
                      });
                      
                      if (!cleanData[0] || !('학번' in cleanData[0] && '이름' in cleanData[0] && '날짜' in cleanData[0] && '교시' in cleanData[0] && '과목' in cleanData[0])) {
                          setError('Excel 파일의 헤더가 올바르지 않습니다. "학번,이름,날짜,교시,과목" 열이 포함되어 있는지 확인해주세요.');
                          return;
                      }
                      
                      setParsedData(cleanData);
                      extractTimeSlotsAndHeaders(cleanData);
                  } catch (err) {
                      setError(`Excel 파싱 오류: ${err.message}`);
                  }
              };
              reader.onerror = () => setError('파일을 읽는 중 오류가 발생했습니다.');
              reader.readAsArrayBuffer(selectedFile);
              return;
          }
          
          Papa.parse(selectedFile, {
              header: true,
              skipEmptyLines: true,
              encoding: "UTF-8",
              complete: (results) => {
                  const cleanData = results.data.map(row => {
                    const newRow = {};
                    for (const key in row) {
                        const cleanKey = key.trim().replace(/^\uFEFF/, '');
                        newRow[cleanKey] = row[key];
                    }
                    return newRow;
                  });

                  if (!cleanData[0] || !('학번' in cleanData[0] && '이름' in cleanData[0] && '날짜' in cleanData[0] && '교시' in cleanData[0] && '과목' in cleanData[0])) {
                    setError('CSV 파일의 헤더가 올바르지 않습니다. "학번,이름,날짜,교시,과목" 열이 포함되어 있는지 확인해주세요.');
                    return;
                  }

                  setParsedData(cleanData);
                  extractTimeSlotsAndHeaders(cleanData);
              },
              error: (err) => setError(`CSV 파싱 오류: ${err.message}`)
          });
        }, []);

        const extractTimeSlotsAndHeaders = (data) => {
            const timeSlotSet = new Set();
            data.forEach(entry => {
                if (entry.날짜 && String(entry.교시).trim()) {
                    timeSlotSet.add(`${entry.날짜}|${entry.교시}`);
                }
            });

            const calculatedTimeSlots = Array.from(timeSlotSet)
                .map(s => {
                    if (!s || !s.includes('|')) return null;
                    const [date, periodStr] = s.split('|');
                    const period = parseInt(periodStr, 10);
                    if (date && !isNaN(period)) return { date, period };
                    return null;
                })
                .filter(Boolean)
                .sort((a, b) => {
                    const dateA = new Date(a.date.split('(')[0].replace(/\//g, '-'));
                    const dateB = new Date(b.date.split('(')[0].replace(/\//g, '-'));
                    if (dateA.getTime() !== dateB.getTime()) return dateA.getTime() - dateB.getTime();
                    return a.period - b.period;
                });
            setTimeSlots(calculatedTimeSlots);

            const subjectsBySlot = {};
            data.forEach(entry => {
                if (isNaN(parseInt(entry.교시, 10))) return;
                const key = `${entry.날짜}|${entry.교시}`;
                if (!subjectsBySlot[key]) subjectsBySlot[key] = new Set();
                subjectsBySlot[key].add(entry.과목);
            });

            const initialHeaderInputs = calculatedTimeSlots.reduce((acc, slot) => {
                const key = `${slot.date}|${slot.period}`;
                const subjects = Array.from(subjectsBySlot[key] || []).join(', ');
                const cleanedSubject = subjects.replace(/\s*\(.*?\)\s*/g, '').trim();
                acc[key] = { subject: cleanedSubject, time: '' };
                return acc;
            }, {});
            setHeaderInputs(initialHeaderInputs);
        };

        const handleFileChange = (e) => processFile(e.target.files?.[0]);
        
        const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(true); };
        const handleDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(false); };
        const handleDrop = (e) => { e.preventDefault(); e.stopPropagation(); setIsDragging(false); processFile(e.dataTransfer.files?.[0]); };
        
        const handleGenerate = useCallback(() => {
          if (!parsedData || timeSlots.length === 0) {
            setError('데이터가 없습니다. 먼저 파일을 업로드해주세요.');
            return;
          }
          
          setError(null);
          setIsLoading(true);
          setGeneratedCsvContent(null);
          setGeneratedCsvRows(null);

          setTimeout(() => {
            try {
              const { csvString, csvRows } = generatePersonalTimetableCsv(parsedData, metadata, headerInputs);
              setGeneratedCsvContent(csvString);
              setGeneratedCsvRows(csvRows);
              
              setTimeout(() => {
                  document.getElementById('result-section')?.scrollIntoView({ behavior: 'smooth' });
              }, 100);

            } catch (e) {
              setError(`생성 오류: ${e.message}`);
            } finally {
              setIsLoading(false);
            }
          }, 500);
        }, [parsedData, metadata, timeSlots, headerInputs]);
        
        const isGenerateDisabled = useMemo(() => {
            return isLoading || !file || !parsedData || timeSlots.length === 0;
        }, [isLoading, file, parsedData, timeSlots]);

        const availableClasses = useMemo(() => {
          if (!generatedCsvRows) return [];
          const classSet = new Set();
          generatedCsvRows.slice(4).forEach(row => {
              const studentId = row[0] || '';
              if (studentId && studentId.length >= 3) {
                  const grade = studentId.substring(0, 1);
                  const classNum = parseInt(studentId.substring(1, 3), 10);
                  if (!isNaN(classNum)) {
                      classSet.add(`${grade}-${classNum}`);
                  }
              }
          });
          return ['all', ...Array.from(classSet).sort((a,b) => a.localeCompare(b, undefined, {numeric: true}))];
        }, [generatedCsvRows]);

        const filteredCsvRows = useMemo(() => {
          if (!generatedCsvRows) return null;
          if (selectedClass === 'all') return generatedCsvRows;
          
          const headerRows = generatedCsvRows.slice(0, 4);
          const bodyRows = generatedCsvRows.slice(4);

          const [grade, classNumStr] = selectedClass.split('-');
          const classPrefix = `${grade}${String(classNumStr).padStart(2, '0')}`;

          const filteredBodyRows = bodyRows.filter(row => {
              const studentId = row[0] || '';
              return studentId && studentId.startsWith(classPrefix);
          });

          return [...headerRows, ...filteredBodyRows];
        }, [generatedCsvRows, selectedClass]);

        const handlePrint = () => {
          const printableElement = document.getElementById('printable-section');
          if (!printableElement) return setError('인쇄할 내용을 찾을 수 없습니다.');

          const printableClone = printableElement.cloneNode(true);
          const controlsToRemove = printableClone.querySelector('.print-hidden');
          if (controlsToRemove) controlsToRemove.remove();

          const printWindow = window.open('', '_blank', 'width=1200,height=800');
          if (!printWindow) return setError('팝업이 차단되었습니다. 팝업을 허용해주세요.');
          
          const tailwindScript = document.querySelector('script[src="https://cdn.tailwindcss.com"]').outerHTML || '';
          const inlineStyles = Array.from(document.querySelectorAll('style')).map(style => style.innerHTML).join('');

          printWindow.document.write(`
              <!DOCTYPE html>
              <html lang="ko">
              <head>
                  <meta charset="UTF-8">
                  <title>시험 시간표 인쇄</title>
                  ${tailwindScript}
                  <style>${inlineStyles}</style>
              </head>
              <body class="bg-white">
                  ${printableClone.innerHTML}
              </body>
              </html>
          `);
          
          printWindow.document.close();
          setTimeout(() => { printWindow.focus(); printWindow.print(); printWindow.close(); }, 1000);
        };

        const BookIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
            </svg>
        );
        const ImageIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
        );
        const UploadIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
        );
        const ClockIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        );
        
        return (
          <div className="flex-grow flex flex-col relative w-full">
            
            {/* Hero Section */}
            <div className="print-hidden bg-gradient-to-br from-[#0c1b3e] via-[#0b2b62] to-[#045994] pt-16 pb-28 px-4 text-center relative overflow-hidden flex-shrink-0">
                <div className="absolute top-0 left-0 w-full h-full overflow-hidden z-0 opacity-20 pointer-events-none">
                    <div className="absolute -top-24 -left-24 w-96 h-96 rounded-full bg-blue-500 blur-3xl"></div>
                    <div className="absolute top-1/2 right-0 w-80 h-80 rounded-full bg-teal-400 blur-3xl"></div>
                </div>

                <div className="relative z-10">
                    <div className="flex justify-center items-center gap-3 mb-6">
                        <span className="inline-flex items-center gap-1.5 bg-white/10 text-white px-3.5 py-1.5 rounded-full text-sm font-semibold border border-white/20 backdrop-blur-sm">
                            <ClockIcon /> Timetable Master
                        </span>
                        <span className="inline-flex items-center bg-amber-400 text-amber-900 px-3 py-1.5 rounded-full text-xs font-black tracking-wider shadow-sm">
                            DATA POWERED
                        </span>
                    </div>
                    <h1 className="text-4xl md:text-5xl font-extrabold text-white tracking-tight mb-4 drop-shadow-md">
                        시험 시간표 자동 생성 시스템
                    </h1>
                    <p className="text-lg text-blue-100 max-w-2xl mx-auto font-medium">
                        KICE 스타일의 깔끔한 분석 알고리즘으로<br className="hidden md:block"/> 
                        학급별/개인별 시간표를 생성합니다.
                    </p>
                </div>
            </div>

            {/* 메인 래퍼: 데이터 입력 영역은 화면 중앙(최대 1152px) 정렬 */}
            <main className="w-full relative z-20 -mt-16 flex-grow flex flex-col">
              
              <div className="w-full max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 pb-10">
                  <div className="print-hidden space-y-6">
                    
                    {error && (
                        <div className="bg-red-50 border-l-4 border-red-500 p-4 rounded-xl shadow-sm flex items-start gap-3">
                            <svg className="h-5 w-5 text-red-500 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                                <path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <div>
                                <p className="font-bold text-red-800 text-sm">오류가 발생했습니다</p>
                                <p className="text-red-600 text-sm mt-1">{error}</p>
                            </div>
                        </div>
                    )}
                    
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <Card title="기본 학사 정보" badgeText="SCOPE SETTING" icon={<BookIcon/>} theme="blue">
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                                <InputBox label="학년도" type="number" name="year" value={metadata.year} onChange={handleMetadataChange} />
                                <InputBox label="학기" type="number" name="semester" value={metadata.semester} onChange={handleMetadataChange} />
                                <SelectBox 
                                    label="고사 구분" 
                                    name="examType" 
                                    value={metadata.examType} 
                                    onChange={handleMetadataChange} 
                                    options={[
                                        { value: 'midterm', label: '중간고사' },
                                        { value: 'final', label: '기말고사' }
                                    ]} 
                                />
                                <InputBox label="학년" type="number" name="grade" value={metadata.grade} onChange={handleMetadataChange} />
                            </div>
                        </Card>

                        <Card title="출력물 디자인 요소" badgeText="VISUAL SETTING" icon={<ImageIcon/>} theme="teal">
                            <div className="h-full flex flex-col justify-center">
                                <p className="text-sm font-semibold text-slate-500 mb-3">시간표 우측 상단에 표시될 학교 로고 (선택)</p>
                                <div className="flex items-center gap-4 bg-slate-50 p-3 rounded-2xl border border-slate-100 min-h-[76px]">
                                    <input type="file" id="logo-upload" className="sr-only" accept="image/*" onChange={handleLogoChange}/>
                                    <label
                                        htmlFor="logo-upload"
                                        className="cursor-pointer flex-shrink-0 px-4 py-2 text-sm font-bold rounded-xl text-teal-700 bg-teal-100 hover:bg-teal-200 transition-colors shadow-sm"
                                    >
                                        {logoSrc ? '로고 변경하기' : '이미지 파일 선택'}
                                    </label>
                                    {logoSrc ? (
                                        <div className="flex items-center gap-3 w-full justify-between pr-2">
                                            <img src={logoSrc} alt="미리보기" className="h-10 max-w-[120px] object-contain rounded bg-white p-1 border border-slate-200 shadow-sm" />
                                            <button onClick={() => setLogoSrc(null)} className="text-slate-400 hover:text-red-500 transition-colors p-1" title="삭제">
                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                                    <path fillRule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clipRule="evenodd" />
                                                </svg>
                                            </button>
                                        </div>
                                    ) : (
                                        <span className="text-sm text-slate-400 font-medium">선택된 파일 없음</span>
                                    )}
                                </div>
                            </div>
                        </Card>
                    </div>

                    <Card title="데이터 원본 업로드" badgeText="DATA INPUT" icon={<UploadIcon/>} theme="indigo">
                        <label
                            htmlFor="file-upload"
                            onDragOver={handleDragOver}
                            onDragLeave={handleDragLeave}
                            onDrop={handleDrop}
                            className={`transition-all duration-200 flex flex-col items-center justify-center px-6 py-10 border-2 border-dashed rounded-2xl cursor-pointer ${
                                isDragging 
                                ? 'border-indigo-400 bg-indigo-50/50' 
                                : 'border-slate-200 bg-slate-50 hover:bg-slate-100 hover:border-indigo-300'
                            }`}
                        >
                            <div className={`p-4 rounded-full mb-4 ${file ? 'bg-indigo-100 text-indigo-600' : 'bg-white shadow-sm text-slate-400'}`}>
                                <svg className="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                                    {file ? (
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    ) : (
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                                    )}
                                </svg>
                            </div>
                            
                            <div className="text-center">
                                {file ? (
                                    <>
                                        <p className="text-lg font-bold text-indigo-700">{file.name}</p>
                                        <p className="text-sm text-indigo-500 mt-1">파일이 성공적으로 로드되었습니다.</p>
                                    </>
                                ) : (
                                    <>
                                        <p className="text-base font-bold text-slate-700 mb-1">클릭하여 파일 선택 또는 여기로 드래그</p>
                                        <p className="text-sm text-slate-500">CSV 또는 Excel 형식 (.csv, .xlsx)</p>
                                    </>
                                )}
                            </div>
                            <input id="file-upload" type="file" className="sr-only" accept=".csv,.xlsx,.xls" onChange={handleFileChange} />
                        </label>
                    </Card>
                  
                    <div className="pt-8 pb-4 flex justify-center">
                        <button
                            onClick={handleGenerate}
                            disabled={isGenerateDisabled}
                            className={`group relative flex items-center justify-center px-10 py-4 text-lg font-bold rounded-full shadow-lg transition-all duration-300 w-full max-w-sm overflow-hidden ${
                                isGenerateDisabled 
                                ? 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none' 
                                : 'bg-gradient-to-r from-blue-600 to-indigo-600 text-white hover:shadow-blue-500/30 hover:scale-[1.02] active:scale-95'
                            }`}
                        >
                            {!isGenerateDisabled && (
                                <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                            )}
                            
                            {isLoading ? (
                                <>
                                    <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                        <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                        <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                    </svg>
                                    데이터 처리 중...
                                </>
                            ) : (
                                <span>{generatedCsvContent ? '최신 정보로 다시 생성' : '시간표 생성'}</span>
                            )}
                        </button>
                        
                        <style dangerouslySetInnerHTML={{__html: `
                            @keyframes shimmer {
                                100% { transform: translateX(100%); }
                            }
                        `}} />
                    </div>
                  </div>
              </div>

              {/* 결과 화면 영역: 한눈에 꽉 차게 보이도록 화면 너비(최대 1600px)를 사용합니다. */}
              {filteredCsvRows && (
                  <div id="result-section" className="w-full bg-slate-50/70 border-t border-slate-200 mt-4 pt-10 pb-20 px-2 sm:px-6 lg:px-8 print:bg-white print:border-none print:p-0 print:mt-0 print:pb-0">
                      <div className="max-w-[1600px] mx-auto w-full">
                          
                          <div className="print-hidden mb-6 flex flex-col md:flex-row justify-between items-center gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-100 max-w-6xl mx-auto">
                              <div className="w-full md:w-auto">
                                {availableClasses.length > 1 ? (
                                    <div className="flex bg-slate-100 p-1 rounded-xl overflow-x-auto hide-scrollbar max-w-full">
                                        {availableClasses.map(className => (
                                            <button
                                                key={className}
                                                onClick={() => setSelectedClass(className)}
                                                className={`whitespace-nowrap px-5 py-2 text-sm font-bold rounded-lg transition-all ${
                                                    selectedClass === className
                                                        ? 'bg-white text-blue-600 shadow-sm'
                                                        : 'text-slate-500 hover:text-slate-700 hover:bg-slate-200/50'
                                                }`}
                                            >
                                                {className === 'all' ? '전체 보기' : `${className}반`}
                                            </button>
                                        ))}
                                    </div>
                                ) : (
                                    <p className="text-slate-500 font-medium px-2">생성 완료된 시간표</p>
                                )}
                              </div>
                              
                              <button
                                  onClick={handlePrint}
                                  className="w-full md:w-auto flex items-center justify-center px-6 py-2.5 bg-slate-800 text-white text-sm font-bold rounded-xl hover:bg-slate-700 transition-colors shadow-sm"
                              >
                                  <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                                      <path strokeLinecap="round" strokeLinejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm7-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                                  </svg>
                                  인쇄하기
                              </button>
                          </div>

                          <div id="printable-section" className="w-full">
                              <div className="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.06)] p-4 sm:p-8 print-card print:p-0">
                                  <div className="relative mb-6 print-header-container border-b-2 border-slate-800 pb-4 print:border-b-2">
                                      <h2 className="text-center text-2xl sm:text-3xl font-extrabold text-slate-900 tracking-tight">
                                          {`${metadata.year}학년도 ${metadata.semester}학기 ${metadata.grade}학년 ${metadata.examType === 'midterm' ? '중간고사' : '기말고사'} 시간표`}
                                      </h2>
                                      {logoSrc && (
                                          <img
                                              src={logoSrc}
                                              alt="School Logo"
                                              className="absolute top-1/2 -translate-y-1/2 right-0 max-h-[40px] w-auto"
                                          />
                                      )}
                                  </div>

                                  <div id="print-area" className="w-full">
                                      <TimetablePreviewTable data={filteredCsvRows} />
                                  </div>
                              </div>
                          </div>
                      </div>
                  </div>
              )}
            </main>
          </div>
        );
      };

      const rootElement = document.getElementById('root');
      const root = ReactDOM.createRoot(rootElement);
      root.render(<App />);
    </script>
</body>
</html>
